<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Scheduling Agent</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #222;
        }

        button {
            background-color: #0070f3;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
            width: 100%;
        }

        button:hover {
            background-color: #005bb5;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #status {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #666;
        }

        .mic-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #0070f3;
        }

        #chat-container {
            margin-top: 1.5rem;
            width: 100%;
            height: 250px;
            overflow-y: auto;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.9rem;
        }

        .chat-msg {
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 85%;
        }

        .msg-agent {
            background-color: #f0f7ff;
            color: #005bb5;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .msg-user {
            background-color: #e8f5e9;
            color: #2e7d32;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
    </style>
    <!-- We will use the livekit-client JS SDK via unpkg for Vanilla JS -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="mic-icon">🎙️</div>
        <h1>AI Calendar Scheduler</h1>
        <p>A voice-native personal assistant to manage your Google Calendar.</p>
        <button id="connectBtn">Connect & Speak</button>
        <div id="status">Status: Disconnected</div>

        <div id="chat-container">
            <div style="text-align:center; color:#999; margin-top: 100px;">Transcriptions will appear here...</div>
        </div>

        <!-- Elements for attaching audio tracks -->
        <div id="audio-elements" style="display: none;"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
